heading:
  hu: Zsuzsánna Hand-made
  en: Zsuzsánna Hand-made
text:
  hu: |-
    Szeretettel, kézzel készült babák és játékok, természetes anyagokból.

    Minden darab egyedi — egyenként, gondosan, sok-sok órányi munkával készül. Nézz körül, és ha valamelyik baba megszólít, írj nekem bátran.
  en: |-
    Lovingly handmade dolls and toys, made from natural materials.

    Every piece is one of a kind — made one at a time, with care and many hours of work. Have a look around, and if a doll speaks to you, just write to me.
