heading:
  hu: Bemutatkozom
  en: Hello, I'm Zsuzsánna
text:
  hu: |-
    Zsuzsánna vagyok, és kézzel készítek babákat. Évek óta varrok, kötök és horgolok — a babakészítésben találtam meg azt, ami a legjobban kitölt.

    Csak természetes anyagokkal dolgozom: gyapjúval, pamuttal, vászonnal. Minden baba egyetlen, megismételhetetlen darab, és sok-sok óra szeretet van benne.

    Hiszem, hogy egy kézzel készült baba egy életre szóló társ lehet. Köszönöm, hogy benéztél!
  en: |-
    I'm Zsuzsánna, and I make dolls by hand. I've been sewing, knitting and crocheting for years — and in dollmaking I found what fills me up the most.

    I work only with natural materials: wool, cotton, linen. Every doll is a single, one-of-a-kind piece, with many hours of love in it.

    I believe a handmade doll can be a companion for life. Thank you for stopping by!
