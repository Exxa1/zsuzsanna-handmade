heading:
  hu: Írj nekem
  en: Get in touch
text:
  hu: |
    A legkönnyebben a közösségi oldalaimon érsz el. Írj nyugodtan üzenetet, ha kérdésed van egy babával kapcsolatban, vagy egyedi darabot szeretnél — örömmel válaszolok!
  en: |
    The easiest way to reach me is on my social pages. Feel free to send a message if you have a question about a doll or would like a custom piece — I'll be glad to reply!
